[workspace]
authors = ["alejandrofontan <fontanvillacampa@gmail.com>", "EmilioOlivastri <emilito.olivastri@gmail.com>"]
channels = ["conda-forge"]
name = "BommieToolkit"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
extract_images = "python scripts/vid2imgs.py"
match_images_by_ns = "python scripts/match_images_by_ns.py"
get_rig_config_json= "python scripts/convert_camchain_to_rig_config.py"
colmap2nerf = { cmd = "python ../scripts/colmap2nerf.py", cwd = "monkey_output" }
extract_images_dev = "python scripts/vid2imgs_dev.py"
visualize_colmap = "python scripts/colmap_rerun.py"

[dependencies]
python = "*"
opencv = "*"
tqdm = "*"
pyyaml = "*"
pillow = ">=12.2.0,<13"

[pypi-dependencies]
rerun-sdk = ">=0.21,<1"

[environments]
kalibr = {features = ["kalibr"], no-default-feature = true}
colmap = {features = ["colmap"], no-default-feature = true}
uwsfm = {features = ["uwsfm"], no-default-feature = true}
sam = {features = ["sam"], no-default-feature = true}

########################################################################################################################
########################################################################################################################
# kalibr feature
[feature.kalibr]
channels = ["https://fast.prefix.dev/conda-forge", "esrf-bcu", "robostack-staging"]
platforms = ["linux-64"]

[feature.kalibr.tasks]
create_catkin_ws = "mkdir -p catkin_ws/src && cd catkin_ws && catkin init"
git-clone = {cmd = "git clone https://github.com/alejandrofontan/kalibr.git catkin_ws/src/kalibr", depends-on = ["create_catkin_ws"] }
build = {cmd = "catkin build -j8 --cmake-args -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5", cwd="catkin_ws", depends-on = ["git-clone"] }
kalibr-calibrate-stereo-rig = {cmd = "./scripts/calibrate_stereo_rig.sh"}

[feature.kalibr.dependencies]
python = {version="3.9.18", build="h0755675_0_cpython", channel="https://fast.prefix.dev/conda-forge"}
ros-noetic-desktop="*"
compilers="*"
cmake="*"
pkg-config="*"
make="*"
ninja="*"
colcon-common-extensions="*"
catkin_tools="*"
rosdep="*"
boost="*"
suitesparse = {version="5.4.0", build="h717dc36_0", channel="https://fast.prefix.dev/conda-forge"}
tbb="*"
opencv="*"
libv4l="*"
pip="*"
scipy="*"
matplotlib="*"
ipython="*"
wxpython ="*"
tk ="*"
pyx="*"
libtiff="*"
tqdm="*"
av = "*"
pillow = "*"
ffmpeg-python = "*"
ffmpeg = "*"
exiftool = "*"

[feature.kalibr.pypi-dependencies]
igraph="*"

########################################################################################################################
########################################################################################################################
# sam feature
[feature.sam]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[feature.sam.system-requirements]
cuda = "12.6"

[feature.sam.tasks]
create_masks = {cmd = "python sam3_gradio_app.py", cwd="scripts"}

[feature.sam.pypi-options]
no-build-isolation = true

[feature.sam.pypi-dependencies]
sam3 = { git = "https://github.com/BommieToolkit/sam3_bommie" }
decord = ">=0.6.0, <0.7"

[feature.sam.dependencies]
# Core Python + GPU
python = "3.12.*"
pip = "*"
setuptools="80.*"
pkg-config="*"
pytorch-gpu = "*"
torchvision = "*"
numpy = "1.26.*"
scipy = "1.16.*"
pandas = "2.3.*"
opencv = "*"              # image processing
typing_extensions = "*"

# CUDA
# CUDA Build Tools
cuda-compiler = "*"
cuda-version = "12.6.*"
cuda-cudart-dev = "*"
cuda-crt = "*"
libcusparse-dev = "*"
cuda-driver-dev = "*"
cuda-nvcc = "*"
cuda-nvrtc-dev = "*"
cuda-nvtx = "*"
cuda-nvtx-dev = "*"
cuda-nvml-dev = "*"
cuda-profiler-api = "*"

# CUDA Libraries
cudnn = "*"
libcublas-dev = "*"
libcudss-dev = "*"
libcufile-dev = "*"
libcufft-dev = "*"
libcurand-dev = "*"
libcusolver-dev = "*"
cusparselt = "*"
libnvjitlink = "*"

# Utilities
ffmpeg = "*"              # video handling
tqdm = "*"
timm = "*"
ftfy = "==6.1.1"
regex = "*"
iopath = "*"
huggingface_hub = ">=0.23"
gradio = "*"
einops = ">=0.8.2,<0.9"
pycocotools = ">=2.0.11,<3"
psutil = ">=7.2.2,<8"

########################################################################################################################
########################################################################################################################
# colmap feature
[feature.colmap]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[feature.colmap.system-requirements]
cuda = "12.6"

[feature.colmap.tasks]

[feature.colmap.dependencies]
colmap = { build="*cuda*", version = "==3.11.1" }

########################################################################################################################
########################################################################################################################
# uwsfm feature
[feature.uwsfm]
channels = ["https://prefix.dev/conda-forge", "emilioolivastri"]
platforms = ["linux-64"]

[feature.uwsfm.system-requirements]
cuda = "12.4"

[feature.uwsfm.dependencies]
refractive_colmap = "==3.9.0"
